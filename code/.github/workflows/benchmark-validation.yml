name: Benchmark Validation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'ch*/**'
      - 'labs/**'
      - 'core/**'
      - 'core/scripts/**'
      - 'cli/**'
      - 'tests/**'
      - '.github/workflows/benchmark-validation.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'ch*/**'
      - 'labs/**'
      - 'core/**'
      - 'core/scripts/**'
      - 'cli/**'
      - 'tests/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov torch --index-url https://download.pytorch.org/whl/cpu
      
      - name: Run unit tests
        run: |
          pytest tests/test_benchmark_metrics.py tests/test_profiler_config.py tests/test_update_custom_metrics.py tests/test_benchmark_fn_sync_detection.py tests/test_benchmark_linter.py tests/test_refresh_readmes.py tests/test_tier1_suite.py tests/test_nvml_numa_helpers.py tests/test_ch02_topology_helpers.py tests/test_topology_guardrails.py tests/test_run_manifest_provenance.py tests/test_run_progress.py -v --tb=short
        continue-on-error: false

      - name: Validate topology shell helpers
        run: |
          bash -n ch03/numa_topology_script.sh
          bash -n ch03/cpu_gpu_numa_optimizations.sh

      - name: Run full benchmark contract linter
        run: |
          python -m core.scripts.linting.check_benchmarks --include-unpaired --fail-on-warnings

      - name: Audit expanded benchmark discovery
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          from core.discovery import discover_benchmark_entrypoints
          from core.benchmark.contract import check_benchmark_file_ast

          repo_root = Path(".").resolve()
          legacy = set(discover_benchmark_entrypoints(repo_root, include_unpaired=False))
          expanded = set(discover_benchmark_entrypoints(repo_root, include_unpaired=True))
          extra = sorted(expanded - legacy)

          findings = []
          total_errors = 0
          total_warnings = 0
          for path in extra:
              ok, errors, warnings = check_benchmark_file_ast(path)
              if errors or warnings:
                  findings.append((path, errors, warnings))
                  total_errors += len(errors)
                  total_warnings += len(warnings)

          print(f"Legacy benchmark discovery count: {len(legacy)}")
          print(f"Expanded benchmark discovery count: {len(expanded)}")
          print(f"Additional benchmark entrypoints outside baseline_/optimized_: {len(extra)}")
          print(f"Expanded audit files with findings: {len(findings)}")
          print(f"Expanded audit errors: {total_errors}")
          print(f"Expanded audit warnings: {total_warnings}")

          summary_env = os.environ.get("GITHUB_STEP_SUMMARY")
          if not summary_env:
              raise RuntimeError("GITHUB_STEP_SUMMARY is not set")
          summary_path = Path(summary_env)
          existing = summary_path.read_text() if summary_path.exists() else ""
          lines = [
              "## Expanded Benchmark Discovery Audit",
              "",
              f"- Legacy benchmark discovery count: `{len(legacy)}`",
              f"- Expanded benchmark discovery count: `{len(expanded)}`",
              f"- Additional benchmark entrypoints outside baseline_/optimized_: `{len(extra)}`",
              f"- Expanded audit files with findings: `{len(findings)}`",
              f"- Expanded audit errors: `{total_errors}`",
              f"- Expanded audit warnings: `{total_warnings}`",
              "",
          ]
          for path, errors, warnings in findings[:20]:
              rel = path.relative_to(repo_root)
              lines.append(f"- `{rel}`")
              for error in errors[:3]:
                  lines.append(f"  - ERROR: {error}")
              for warning in warnings[:3]:
                  lines.append(f"  - WARNING: {warning}")

          summary_path.write_text(existing + "\n".join(lines) + "\n")
          PY
        continue-on-error: true
      
      - name: Validate benchmark imports
        run: |
          python core/scripts/validate_imports.py --chapter 1 || true
          python core/scripts/validate_imports.py --chapter 6 || true
          python core/scripts/validate_imports.py --chapter 7 || true
        continue-on-error: true  # Some imports need CUDA
      
      - name: Analyze metrics coverage
        run: |
          python core/scripts/update_custom_metrics.py --analyze
      
      - name: Generate coverage report
        run: |
          python core/scripts/benchmark_coverage.py --markdown >> $GITHUB_STEP_SUMMARY
      
      - name: Audit silent fallbacks
        run: |
          python core/scripts/audit_silent_fallbacks.py
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install linters
        run: |
          pip install flake8 mypy
      
      - name: Run flake8
        run: |
          flake8 core/ cli/ core/scripts/ tests/ --max-line-length=120 --ignore=E501,W503,E402 --count --statistics
        continue-on-error: true
      
      - name: Run mypy
        run: |
          mypy core/benchmark/metrics.py --ignore-missing-imports
        continue-on-error: true
