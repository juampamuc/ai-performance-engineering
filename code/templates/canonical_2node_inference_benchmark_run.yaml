apiVersion: benchmarking.aisp.dev/v1alpha1
kind: BenchmarkRun
metadata:
  name: canonical-2node-inference-vllm
  labels:
    aisp.dev/benchmark-class: publication_grade
    aisp.dev/owner: performance-engineering
    aisp.dev/canonical-surface: 2node-inference
spec:
  intent:
    benchmarkClass: publication_grade
    workloadType: inference
    schedulerPath: slinky-kueue
    cadence: pre_release
  layers:
    - name: micro
      enabled: false
      objective: Keep the methodology layer visible even when this example centers on component and end-to-end serving evidence.
      suites: []
    - name: component
      enabled: true
      objective: Validate the exact 2-node contract before launching workloads and capture serving-path evidence with stable inputs.
      suites:
        - name: multinode-readiness
          repoCommand: python -m cli.aisp cluster common-eval --preset multinode-readiness --run-id ${RUN_ID} --hosts ${HOSTS} --labels ${LABELS} --ssh-user ${SSH_USER} --oob-if ${OOB_IF} --socket-ifname ${SOCKET_IFNAME}
        - name: serving-cost-contract
          repoCommand: python -m cli.aisp tools benchmark-contracts
    - name: end_to_end
      enabled: true
      objective: Run the canonical 2-node vLLM bundle and preserve the full evidence packet for baseline-versus-candidate comparisons.
      suites:
        - name: 2node-modern-llm
          repoCommand: python -m cli.aisp cluster common-eval --preset modern-llm --run-id ${RUN_ID} --hosts ${HOSTS} --labels ${LABELS} --ssh-user ${SSH_USER} --ssh-key ${SSH_KEY} --oob-if ${OOB_IF} --socket-ifname ${SOCKET_IFNAME} --primary-label ${PRIMARY_LABEL} --extra-arg --gpu-hourly-cost-usd --extra-arg ${GPU_HOURLY_COST_USD} --extra-arg --vllm-multinode-image --extra-arg ${VLLM_MULTINODE_IMAGE}
  workload:
    model: openai/gpt-oss-120b
    sequenceLengthMix:
      - inputTokens: 1024
        outputTokens: 1024
        weight: 1.0
    precision: bf16
    batchingPolicy: continuous
    concurrencyModel: closed_loop
    datasetRef: templates/canonical_2node_inference_workload_spec.yaml
    fixedAcrossTrials:
      - model
      - sequenceLengthMix
      - precision
      - batchingPolicy
      - concurrencyModel
      - runtimeImageDigest
      - visibleGpuShape
      - oobIf
      - socketIfname
  comparison:
    variableUnderTest: runtime_version
    baseline:
      artifactRef: cluster/runs/${BASELINE_RUN_ID}
      description: baseline canonical 2-node serving run
    candidate:
      artifactRef: cluster/runs/${RUN_ID}
      description: candidate canonical 2-node serving run
    controls:
      fixed:
        model: openai/gpt-oss-120b
        sequenceLengthMix: "[{1024/1024@1.0}]"
        precision: bf16
        batchingPolicy: continuous
        concurrencyModel: closed_loop
      compareOneVariableAtATime: true
  metrics:
    training:
      enabled: false
      primary:
        - time_to_train_hours
        - mfu_pct
        - scaling_efficiency_pct
        - training_reliability_pct
    inference:
      enabled: true
      primary:
        - ttft_ms
        - tokens_per_second
        - p99_latency_ms
        - jitter_ms
        - cost_per_request_usd
      secondary:
        - cost_per_token_usd
        - request_goodput
        - p50_latency_ms
        - gpu_utilization_pct
  trials:
    minReplicates: 3
    confidenceLevel: 0.95
    outlierPolicy:
      method: mad
      action: flag_and_keep
    report:
      distributions: true
      confidenceIntervals: true
      rankLevelOutliers: true
  bottleneckAnalysis:
    taxonomy:
      - compute_bound
      - comm_bound
      - input_bound
      - control_plane_bound
    decomposeOverheads:
      - compute
      - communication
      - storage
      - orchestration
    instrumentation:
      compute_bound:
        - model_server_metrics
        - gpu_counters
        - ncu
      comm_bound:
        - nccl_traces
        - rdma_probes
        - nvlink_exporter
      input_bound:
        - storage_probes
        - dataloader_metrics
        - network_probes
      control_plane_bound:
        - scheduler_timing
        - queue_depth
        - job_startup_trace
  distributed:
    requireRankLevelVisibility: true
    collectives:
      - latency
      - bandwidth
      - outliers
    nodeDiagnosis:
      validate:
        - rdma_pathing
        - gpu_nic_affinity
        - pcie_link_health
        - nvlink_health
        - thermal_throttling
      remediation:
        - isolate_bad_node
        - cordon_problematic_node
      exporters:
        - node-pci-exporter
        - nvlink-exporter
        - gpu-thermal-exporter
  observability:
    correlation:
      stableJoinKeys:
        - run_id
        - benchmark_case_id
        - scheduler_run_id
        - job_uid
        - pod_uid
        - node_name
        - gpu_uuid
        - rank_id
        - request_id
        - trace_id
      publishedNumberLineage:
        rawArtifactManifestDigest: true
        warehouseRowLineage: true
        querySpecCaptured: true
    telemetrySources:
      service:
        - model_server_metrics
        - request_traces
        - queue_time
      infrastructure:
        - dcgm-exporter
        - nvlink-exporter
        - node-pci-exporter
        - ping-exporter
        - node-problem-detector
        - hpc-verification
      scheduler:
        - kubernetes_events
        - kueue
        - slinky
    scenarioPlaybooks:
      - tail_latency_regression
      - low_gpu_utilization
      - distributed_straggler
      - scheduler_backpressure
  provenance:
    capture:
      pinnedWorkloadSpec: true
      imageDigest: true
      driverCudaNcclRuntimeVersions: true
      hardwareTopology: true
      immutableRawArtifacts: true
      auditTrail: true
    signing:
      required: true
      backend: sigstore
      attestationFormat: in_toto
  executionPolicy:
    publicationGrade:
      dedicatedNodes: true
      stableBackgroundLoad: true
      fixedTopology: true
      topologyExclusiveScheduling: true
    realismGrade:
      multiTenantScenarios: false
      captureClusterContext: true
  sinks:
    rawArtifacts:
      store: object_storage
      pathTemplate: s3://benchmarks/raw/${RUN_ID}/
      retentionClass: cold_immutable
      artifacts:
        - logs
        - traces
        - profiler_reports
        - manifests
        - exported_metrics
    hotMetrics:
      store: prometheus
      retentionDays: 30
      cardinalityBudget:
        maxActiveSeries: 2000000
        dropDimensions:
          - request_id
          - trace_id
          - prompt_hash
    curatedWarehouse:
      store: parquet_duckdb
      layout:
        facts:
          - benchmark_run_fact
          - serving_outcome_fact
          - telemetry_slice_fact
        dimensions:
          - software_version_dim
          - hardware_topology_dim
          - cluster_region_dim
          - workload_dim
          - artifact_lineage_dim
      retention:
        hotDays: 30
        warmDays: 180
        coldDays: 730
      lineage:
        publishedNumbersTraceableToRaw: true
        manifestDigestColumn: true
        workloadSpecDigestColumn: true
        artifactRootColumn: true
  automation:
    ci:
      canary: true
      nightly: true
      preRelease: true
